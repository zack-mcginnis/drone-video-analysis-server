version: '3'

services:
  rtmp-server:
    build:
      context: ./rtmp-server
    ports:
      - "1935:1935"  # RTMP
      - "8080:8080"  # HLS
    volumes:
      - recordings:/recordings
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-bucket-d8mdwm}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - API_SERVER_URL=http://api-server:8000
    networks:
      - app-network

  mock-video-source:
    build: ./mock-video-source
    depends_on:
      - rtmp-server
    networks:
      - drone-network

  api-server:
    build:
      context: ./api-server
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-bucket-d8mdwm}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - USE_LIGHTSAIL_BUCKET=${USE_LIGHTSAIL_BUCKET:-true}
      - CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN}
      - AWS_POSTGRES_HOST=${AWS_POSTGRES_HOST}
      - AWS_POSTGRES_PORT=${AWS_POSTGRES_PORT:-5432}
      - AWS_POSTGRES_DB=${AWS_POSTGRES_DB:-recordings}
      - AWS_POSTGRES_USER=${AWS_POSTGRES_USER}
      - AWS_POSTGRES_PASSWORD=${AWS_POSTGRES_PASSWORD}
    depends_on:
      - db
    networks:
      - app-network
    volumes:
      - ./api-server/app:/app/app
      - ./api-server/alembic:/app/alembic
      - ./api-server/scripts:/app/scripts

  db:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${LOCAL_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${LOCAL_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${LOCAL_POSTGRES_DB:-recordings}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  recordings:
  postgres_data:

networks:
  app-network:
    driver: bridge
  drone-network:
    driver: bridge 